<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TH´S - Simetría Espaciada</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="vlr-layout">
        <aside class="sidebar">
            <div class="vlr-logo">TH´S</div>
            <p id="playerCount" class="counter">(0 / 16)</p>
            <div class="input-group">
                <input type="text" id="playerInput" placeholder="Nombre..." onkeydown="if(event.key === 'Enter') addPlayer()">
                <button onclick="addPlayer()">+</button>
            </div>
            <ul id="playersAddedList" class="added-teams"></ul>
            <div class="control-actions">
                <button class="btn-main" onclick="startTournament()">INICIAR TORNEO</button>
                <button class="btn-undo" onclick="undoAction()">↩ DESHACER</button>
                <button class="btn-reset" onclick="resetTournament()">⚠️ RESET</button>
            </div>
        </aside>

        <main class="tournament-scroll">
            <div class="bracket-grid" id="mainBracket"></div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
